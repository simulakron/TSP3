version: '3.9'

services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./tfp.db
      SECRET_KEY: supersecretkeyforjwt2026
    volumes:
      - ./backend:/app
